*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,'Microsoft YaHei',sans-serif;font-size:13px;color:#cbd5e1;background:#0f1117}
.dashboard{display:flex;height:100vh;max-width:1440px;margin:0 auto;background:#161821;box-shadow:0 0 40px rgba(0,0,0,.5)}
.sidebar{width:260px;min-width:260px;border-right:1px solid #2a3040;display:flex;flex-direction:column;background:#12141d}
.sidebar-header{padding:12px 14px;border-bottom:1px solid #2a3040;background:#161821}
.sidebar-header h2{font-size:13px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 10px}
.model-card{background:#1a1d27;border:1px solid #2a3040;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.model-card h4{font-size:11px;font-weight:600;color:#e2e8f0;margin-bottom:5px}
.section-title{font-size:9px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:6px 0 3px;padding-left:1px}
.form-row{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.form-row label{font-size:10px;width:50px;color:#94a3b8;flex-shrink:0;font-weight:500}
.form-row select,.form-row input{flex:1;padding:3px 6px;border:1px solid #3a4050;border-radius:4px;font-size:10px;outline:none;background:#212533;color:#cbd5e1;transition:border-color .12s}
.form-row select:focus,.form-row input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.param-row{display:flex;align-items:center;gap:4px;margin:3px 0}
.param-row label{font-size:9px;color:#64748b;width:40px;flex-shrink:0}
.param-row input[type=range]{flex:1;height:2px;padding:0;border:none;accent-color:#3b82f6;cursor:pointer;background:#2a3040}
.param-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:#3b82f6;cursor:pointer}
.param-row span{font-size:8px;color:#64748b;width:20px;text-align:right;font-variant-numeric:tabular-nums}
.btn-run{width:100%;padding:8px;border:none;border-radius:5px;background:#3b82f6;color:#fff;font-size:11px;font-weight:600;cursor:pointer;margin-top:4px;transition:all .15s;letter-spacing:.3px}
.btn-run:hover{background:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-run:disabled{opacity:.4;cursor:default}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid #2a3040;background:#161821}
.topbar h1{font-size:13px;font-weight:600;color:#f1f5f9}
.status{font-size:9px;padding:2px 8px;border-radius:999px;background:#14532d;color:#86efac;font-weight:500}
.status.busy{background:#713f12;color:#fde047}
.status.err{background:#7f1d1d;color:#fca5a5}
.metric-bar{display:flex;gap:6px;padding:6px 16px;border-bottom:1px solid #2a3040;background:#12141d}
.metric-card{flex:1;background:#1a1d27;border:1px solid #2a3040;border-radius:6px;padding:5px 8px;text-align:center}
.metric-card .ml{font-size:9px;color:#64748b;font-weight:500}
.metric-card .mv{font-size:14px;font-weight:700;color:#f1f5f9;margin-top:1px;font-variant-numeric:tabular-nums}
.tabs{display:flex;border-bottom:1px solid #2a3040;padding:0 16px;background:#12141d;gap:2px}
.tab{padding:6px 12px;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:all .15s;font-weight:500}
.tab:hover{color:#cbd5e1;background:#1a1d27;border-radius:4px 4px 0 0}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa;background:transparent}
.content{flex:1;padding:10px 14px;overflow-y:auto}
.tab-pane{display:none}
.tab-pane.active{display:block}
.chart-box{background:#1a1d27;border:1px solid #2a3040;border-radius:8px;padding:10px;margin-bottom:8px}
.chart-box h3{font-size:11px;font-weight:600;color:#e2e8f0;margin-bottom:5px}
.chart-box canvas{width:100%!important;max-height:240px}
#rocC,#cmpC{max-height:400px!important}
#cmG>div{min-height:220px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;color:#64748b;font-size:11px}
.empty-state .icon{font-size:32px;margin-bottom:4px;opacity:.25}
#log{font-size:10px;color:#64748b;max-height:40px;overflow:hidden;padding:4px 8px;border-top:1px solid #2a3040;background:#12141d;white-space:nowrap;text-overflow:ellipsis}
</style>

<script>
// ====== 辅助 ======
function $(id){return document.getElementById(id);}
function lbl(id){var e=$(id);var s=$(id+'v');if(s)s.textContent=parseFloat(e.value).toFixed(2);}
function tab(n){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});

  var p=$('p-'+n);if(p)p.classList.add('active');}
function log(t){$('log').textContent='⏳ '+t;}
function err(t){$('log').textContent='❌ '+t;$('status').textContent='error';$('status').className='status err';}
const MN={LR:'逻辑回归',RF:'随机森林',GBM:'梯度提升',SVC:'支持向量机'};
const CL={LR:'#3b82f6',RF:'#8b5cf6',GBM:'#10b981',SVC:'#f59e0b'};

// Chart.js 暗色主题全局默认值
if(typeof Chart!=='undefined'){
  Chart.defaults.color='#94a3b8';
  Chart.defaults.borderColor='#2a3040';
  Chart.defaults.scale.grid.color='#2a3040';
  Chart.defaults.scale.grid.tickColor='#2a3040';
}
var charts={};

// ====== ML 算法（简化版，用 sklearn 风格的 JS 实现）=====
// 这些函数在 ml_js.js 中定义：LogisticRegressionJS, RandomForestJS, GradientBoostingJS, LinearSVCJS
// 以及工具函数：accuracy, precision, recall, f1, rocAuc, rocCurve, confusionMat

// ====== 特征工程 ======
function buildFeatures(raw){
  var n=raw.trade_date.length,f={};
  for(var k in raw)f[k]=raw[k];

  f.r1=[];f.r5=[];f.r10=[];f.r20=[];
  f.hl=[];f.co=[];
  for(var i=0;i<n;i++){
    f.r1.push(f.close[i]/f.pre_close[i]-1);
    f.hl.push((f.high[i]-f.low[i])/f.close[i]);
    f.co.push((f.close[i]-f.open[i])/f.open[i]);
    f.r5.push(i>=5?f.close[i]/f.close[i-5]-1:NaN);
    f.r10.push(i>=10?f.close[i]/f.close[i-10]-1:NaN);
    f.r20.push(i>=20?f.close[i]/f.close[i-20]-1:NaN);
  }

  function ma(data,p){var r=[];for(var i=0;i<n;i++){if(i<p-1){r.push(NaN);continue;}var s=0;for(var j=i-p+1;j<=i;j++)s+=data[j];r.push(s/p);}return r;}
  var m5=ma(f.close,5);var m20=ma(f.close,20);f.ma20r=m20.map(function(v,i){return v?f.close[i]/v-1:NaN;});
  f.mc=m20.map(function(v,i){return v&&m5[i]?m5[i]/v-1:NaN;});

  f.s20=[];for(i=0;i<n;i++){if(i<20){f.s20.push(NaN);continue;}var s=0,m=0;for(j=i-20;j<=i;j++)m+=f.close[j];m/=21;for(j=i-20;j<=i;j++)s+=(f.close[j]-m)**2;f.s20.push(Math.sqrt(s/21));}

  f.atr=[];for(i=0;i<n;i++){if(i<14){f.atr.push(NaN);continue;}s=0;for(j=i-13;j<=i;j++)s+=Math.max(f.high[j]-f.low[j],Math.abs(f.high[j]-f.close[j-1]),Math.abs(f.low[j]-f.close[j-1]));f.atr.push(s/14);}

  f.bbm=ma(f.close,20);f.bbu=[];f.bbl=[];f.bbw=[];
  for(i=0;i<n;i++){if(!f.bbm[i]||!f.s20[i]){f.bbu.push(NaN);f.bbl.push(NaN);f.bbw.push(NaN);continue;}
    f.bbu.push(f.bbm[i]+2*f.s20[i]);f.bbl.push(f.bbm[i]-2*f.s20[i]);f.bbw.push((f.bbu[i]-f.bbl[i])/f.bbm[i]);}

  f.rsi=[];for(i=0;i<n;i++){if(i<14){f.rsi.push(NaN);continue;}var g=0,l=0;
    for(j=i-13;j<=i;j++){var d=f.close[j]-f.close[j-1];if(d>0)g+=d;else l-=d;}g/=14;l/=14;f.rsi.push(l===0?100:100-100/(1+g/l));}

  function ema(data,sp){var k=2/(sp+1),r=[data[0]];for(i=1;i<n;i++)r.push(data[i]*k+r[i-1]*(1-k));return r;}
  var e12=ema(f.close,12),e26=ema(f.close,26);f.macd=e12.map(function(v,i){return v-e26[i];});
  f.macs=ema(f.macd,9);f.mach=f.macd.map(function(v,i){return v-f.macs[i];});

  f.obv=[0];for(i=1;i<n;i++)f.obv.push(f.obv[i-1]+(f.close[i]>f.pre_close[i]?f.vol[i]:f.close[i]<f.pre_close[i]?-f.vol[i]:0));
  var vm5=ma(f.vol,5);f.vmr=f.vol.map(function(v,i){return vm5[i]?v/vm5[i]:NaN;});
  var v20=ma(f.vol,20);f.vpd=f.r1.map(function(v,i){return v20[i]?v*(f.vol[i]/v20[i]-1):NaN;});
  f.rs=f.close.map(function(v,i){return i<60?NaN:v/ma(f.close,60)[i]-1;});
  var pct=[NaN];for(i=1;i<n;i++)pct.push(f.close[i]/f.close[i-1]-1);
  function sd(data,p){var r=[];for(i=0;i<n;i++){if(i<p-1){r.push(NaN);continue;}var s=0,m=0;for(j=i-p+1;j<=i;j++)m+=data[j];m/=p;for(j=i-p+1;j<=i;j++)s+=(data[j]-m)**2;r.push(Math.sqrt(s/p));}return r;}
  var v5=sd(pct,5),v60=sd(pct,60);f.vr=v5.map(function(v,i){return v60[i]&&v60[i]>1e-10?v/v60[i]:NaN;});
  f.sk=[];f.ku=[];for(i=0;i<n;i++){if(i<20){f.sk.push(NaN);f.ku.push(NaN);continue;}m=0;for(j=i-19;j<=i;j++)m+=f.r1[j];m/=20;
    s2=0;s3=0;s4=0;for(j=i-19;j<=i;j++){var d=f.r1[j]-m;s2+=d*d;s3+=d*d*d;s4+=d*d*d*d;}s2/=20;var st=Math.sqrt(s2);
    f.sk.push(st>0?(s3/20)/(st*st*st):0);f.ku.push(st>0?(s4/20)/(st*st*st*st)-3:0);}
  return f;
}

// ====== 标准化 ======
function std(X){var m=X[0].length,n=X.length,mean=[],sd=[];
  for(var j=0;j<m;j++){var s=0;for(var i=0;i<n;i++)s+=X[i][j];mean[j]=s/n;}
  for(j=0;j<m;j++){s=0;for(i=0;i<n;i++)s+=(X[i][j]-mean[j])**2;sd[j]=Math.sqrt(s/n)||1;}
  return X.map(function(row){return row.map(function(v,j){return(v-mean[j])/sd[j];});});}

// ====== 主流程 ======
function run(){
  var btn=$('btn-run');btn.disabled=true;btn.textContent='⏳ 运行中...';
  $('status').textContent='running';$('status').className='status busy';
  $('init').style.display='none';
  document.querySelectorAll('.tab-pane').forEach(function(p){p.style.display='';});

  log('特征工程...');
  setTimeout(function(){
    try {
      var raw=SD[$('sl-stock').value];
      if(!raw){err('股票数据未找到');return;}
      var f=buildFeatures(raw);
      log('特征构建完成，构造标签...');

      // 标签
      var n=raw.trade_date.length;
      var fwd=[];for(var i=0;i<n;i++)fwd.push(i+20<n?f.close[i+20]/f.close[i]-1:NaN);
      var sv=fwd.filter(function(v){return!isNaN(v);}).sort(function(a,b){return a-b;});
      var up=sv[Math.floor(sv.length*0.7)],dn=sv[Math.floor(sv.length*0.3)];
      var lbl=[];for(i=0;i<n;i++){if(isNaN(fwd[i]))lbl.push(NaN);else if(fwd[i]>up)lbl.push(1);else if(fwd[i]<dn)lbl.push(0);else lbl.push(NaN);}

      var keys=['r1','r5','r10','r20','hl','co','ma20r','mc','s20','atr','bbu','bbl','bbw','rsi','macd','macs','mach','obv','vmr','vpd','rs','vr','sk','ku'];
      log('筛选有效样本...');
      var vi=[];for(i=0;i<n;i++){if(isNaN(lbl[i]))continue;var ok=true;
        for(var kk=0;kk<keys.length;kk++){if(!f[keys[kk]]||isNaN(f[keys[kk]][i])){ok=false;break;}}
        if(ok)vi.push(i);}
      if(vi.length<30){err('有效样本不足('+vi.length+')');return;}

      var X=vi.map(function(idx){return keys.map(function(k){return f[k][idx];});});
      var y=vi.map(function(idx){return lbl[idx];});
      var cp=vi.map(function(idx){return f.close[idx];});

      var ns=X.length,ts=Math.floor((ns-20)/5),folds=[];
      for(i=0;i<5;i++){var te=ns-(4-i)*ts,teS=te-ts,trE=teS-20;if(trE<10)continue;
        var tr=[];for(var ti=0;ti<trE;ti++)tr.push(ti);
        var teA=[];for(ti=teS;ti<te;ti++)teA.push(ti);
        folds.push({train:tr,test:teA});}
      log('5折CV ('+folds.length+'折) 训练 '+vi.length+' 样本...');

      var cfg={lr:{C:parseFloat($('lr-c').value)},rf:{ne:parseInt($('rf-ne').value),md:parseInt($('rf-md').value)},
        gb:{ne:parseInt($('gb-ne').value),lr:parseFloat($('gb-lr').value)},sv:{C:parseFloat($('sv-c').value)}};
      log('参数: LR.C='+cfg.lr.C+' RF.trees='+cfg.rf.ne+' depth='+cfg.rf.md+' GBM.trees='+cfg.gb.ne+' lr='+cfg.gb.lr+' SVC.C='+cfg.sv.C);

      var defs=[
        {id:'LR',build:function(){return new LogisticRegressionJS(cfg.lr.C,'balanced',0.1,300);}},
        {id:'RF',build:function(){return new RandomForestJS(cfg.rf.ne,cfg.rf.md);}},
        {id:'GBM',build:function(){return new GradientBoostingJS(cfg.gb.ne,cfg.gb.lr,3);}},
        {id:'SVC',build:function(){return new LinearSVCJS(cfg.sv.C,0.01,200);}},
      ];

      var res=[],roc={},cm={},fi={},sim={};
      log('模型训练中...');

      defs.forEach(function(md){
        var fms=[];
        folds.forEach(function(fold,fi){
          var trX=fold.train.map(function(i){return X[i];});
          var trY=fold.train.map(function(i){return y[i];});
          var teX=fold.test.map(function(i){return X[i];});
          var teY=fold.test.map(function(i){return y[i];});
          var tX=trX,eX=teX;
          if(md.id==='LR'||md.id==='SVC'){var al=std(trX.concat(teX));tX=al.slice(0,trX.length);eX=al.slice(trX.length);}
          var model=md.build();model.fit(tX,trY);
          var yp=model.predict(eX),ypb=model.predictProba(eX);
          fms.push({a:accuracy(teY,yp),p:precision(teY,yp),r:recall(teY,yp),f:f1(teY,yp),u:rocAuc(teY,ypb)});
          if(fi===folds.length-1){
            var rc=rocCurve(teY,ypb);
            roc[md.id]={fpr:rc.fpr,tpr:rc.tpr,auc:rocAuc(teY,ypb)};
            cm[md.id]=confusionMat(teY,yp);
            var tc=fold.test.map(function(i){return cp[i];});
            var dr=[];for(var di=1;di<tc.length;di++)dr.push(tc[di]/tc[di-1]-1);
            var sg=yp.slice(0,-1);var cum=1,pk=1,mdD=0,wn=0;
            for(di=0;di<dr.length;di++){var rt=sg[di]*dr[di]+(1-sg[di])*0.02/252;cum*=(1+rt);if(rt>0)wn++;pk=Math.max(pk,cum);mdD=Math.min(mdD,(cum-pk)/pk);}
            var ar=Math.pow(cum,252/dr.length)-1;
            var ex=dr.map(function(v,i){return sg[i]*v+(1-sg[i])*0.02/252-0.02/252;});
            var me=ex.reduce(function(a,v){return a+v;},0)/ex.length;
            var se=Math.sqrt(ex.reduce(function(a,v){return a+(v-me)**2;},0)/ex.length)||1e-10;
            sim[md.id]={a:ar,sh:Math.sqrt(252)*me/se,md:mdD,wr:wn/dr.length};
          }
        });
        var avg={a:0,p:0,r:0,f:0,u:0};fms.forEach(function(m){avg.a+=m.a;avg.p+=m.p;avg.r+=m.r;avg.f+=m.f;avg.u+=m.u;});
        var nf=folds.length;res.push({model:md.id,Accuracy:avg.a/nf,Precision:avg.p/nf,Recall:avg.r/nf,F1:avg.f/nf,AUC:avg.u/nf});
      });

      var best=res.reduce(function(a,b){return a.AUC>b.AUC?a:b;});
      log('渲染结果...');
      setTimeout(function(){render({bm:best.model,ba:best.AUC,res:res,roc:roc,cm:cm,fi:fi,sim:sim});},10);
    } catch(e){
      err(e.message);console.error(e);
    }
    btn.disabled=false;btn.textContent='▶ 运行回测';
  },10);
}

// ====== 渲染 ======
function render(d){
  try{
  $('m-best').textContent=MN[d.bm]||d.bm;$('m-best').style.color=CL[d.bm]||'#0f172a';
  $('m-auc').textContent=(d.ba||0).toFixed(4);
  var bs='',bv=-999;Object.keys(d.sim).forEach(function(k){var v=d.sim[k];if(v&&v.sh>bv){bs=k;bv=v.sh;}});
  $('m-sharpe').textContent=bv===-999?'N/A':bv.toFixed(3);
  var wd=0;Object.values(d.sim).forEach(function(v){if(v&&v.md<wd)wd=v.md;});
  $('m-dd').textContent=(wd*100).toFixed(2)+'%';
  $('status').textContent='completed';$('status').className='status';
  $('log').textContent='✅ 完成。共 '+(d.res?d.res.length:0)+' 个模型';

  // ---- ROC 曲线 ----
  try{
  if(charts.roc){charts.roc.destroy();charts.roc=null;}
  var ds=[];
  Object.keys(d.roc||{}).forEach(function(k){
    var v=d.roc[k];if(!v||!v.fpr||!v.tpr||v.fpr.length<2)return;
    var pts=v.tpr.map(function(t,i){return{x:v.fpr[i],y:t};});
    ds.push({label:MN[k]+' ('+(v.auc||0).toFixed(4)+')',data:pts,borderColor:CL[k]||'#666',
      borderWidth:2,pointRadius:0,tension:0,fill:false,showLine:true});});
  ds.push({label:'随机基准',data:[{x:0,y:0},{x:1,y:1}],
    borderColor:'#999',borderWidth:1,borderDash:[5,5],pointRadius:0,showLine:true});
  if(ds.length>1){
    charts.roc=new Chart($('rocC'),{type:'line',
      data:{datasets:ds},
      options:{responsive:true,maintainAspectRatio:true,
        scales:{x:{type:'linear',position:'bottom',min:0,max:1,title:{display:true,text:'假正率 (FPR)'}},
                y:{min:0,max:1,title:{display:true,text:'真正率 (TPR)'}}},
        plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}},
                 tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label||'';}}}},
        elements:{point:{radius:0}}}});}}
  catch(e){console.error('ROC render err:',e);$('log').textContent='⚠ ROC渲染错误: '+e.message;}

  // ---- 混淆矩阵 ----
  var g=$('cmG');g.innerHTML='';
  Object.keys(d.cm||{}).forEach(function(k){
    var v=d.cm[k];if(!v)return;
    var total=v.tp+v.tn+v.fp+v.fn;
    var dv=document.createElement('div');
    dv.style.cssText='background:#1a1d27;border:1px solid #2a3040;border-radius:6px;padding:8px;text-align:center';
    dv.innerHTML='<div style="font-size:12px;font-weight:600;color:#e2e8f0;margin-bottom:6px">'+MN[k]+'</div>'+
      '<div style="display:inline-grid;grid-template-columns:auto 1fr 1fr;gap:2px;font-size:13px">'+
      '<div style="padding:2px 4px;color:#94a3b8;font-size:10px"></div>'+
      '<div style="padding:2px 4px;color:#94a3b8;font-size:10px;font-weight:500">预测涨</div>'+
      '<div style="padding:2px 4px;color:#94a3b8;font-size:10px;font-weight:500">预测跌</div>'+
      '<div style="padding:4px 6px;color:#94a3b8;font-size:10px;font-weight:500">实际涨</div>'+
      '<div style="background:#064e3b;padding:8px 10px;border-radius:3px;font-weight:600;color:#6ee7b7;font-size:14px">TP='+v.tp+'</div>'+
      '<div style="background:#7f1d1d;padding:8px 10px;border-radius:3px;font-weight:600;color:#fca5a5;font-size:14px">FN='+v.fn+'</div>'+
      '<div style="padding:4px 6px;color:#94a3b8;font-size:10px;font-weight:500">实际跌</div>'+
      '<div style="background:#7f1d1d;padding:8px 10px;border-radius:3px;font-weight:600;color:#fca5a5;font-size:14px">FP='+v.fp+'</div>'+
      '<div style="background:#064e3b;padding:8px 10px;border-radius:3px;font-weight:600;color:#6ee7b7;font-size:14px">TN='+v.tn+'</div>'+
      '</div>'+
      '<div style="font-size:8px;color:#94a3b8;margin-top:2px">总样本: '+total+' | 准确率: '+((v.tp+v.tn)/total*100).toFixed(1)+'%</div>';
    g.appendChild(dv);
  });

  // ---- 模拟交易指标对比 ----
  var fg=$('fiG');
  fg.innerHTML=''; // 清除旧内容
  try{
  var simKeys=Object.keys(d.sim||{});
  if(simKeys.length>0){
    var simLabels=simKeys.map(function(k){return MN[k]||k;});
    var pal={LR:'#3b82f6',RF:'#8b5cf6',GBM:'#10b981',SVC:'#f59e0b'};
    var metrics=[
      {id:'sim-ann',title:'年化收益率(%)',key:'a',fmt:function(v){return((v||0)*100).toFixed(1)+'%'}},
      {id:'sim-sh',title:'夏普比率',key:'sh',fmt:function(v){return(v||0).toFixed(2)}},
      {id:'sim-wr',title:'胜率(%)',key:'wr',fmt:function(v){return((v||0)*100).toFixed(1)+'%'}},
      {id:'sim-dd',title:'最大回撤(%)',key:'md',fmt:function(v){return(Math.abs(v||0)*100).toFixed(1)+'%'}}
    ];
    var fiCanvas=$('fiG-canvas');
    if(fiCanvas)fiCanvas.style.display='none';
    var grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px';
    metrics.forEach(function(mt){
      var box=document.createElement('div');
      box.style.cssText='background:#1a1d27;border:1px solid #2a3040;border-radius:6px;padding:6px';
      box.innerHTML='<div style="font-size:10px;font-weight:600;color:#e2e8f0;margin-bottom:3px;text-align:center">'+mt.title+'</div><canvas id="'+mt.id+'" style="width:100%;height:130px"></canvas>';
      grid.appendChild(box);
    });
    fg.appendChild(grid);
    metrics.forEach(function(mt){
      var vals=simKeys.map(function(k){
        var v=d.sim[k][mt.key]||0;
        return mt.key==='md'?Math.abs(v)*100:(mt.key==='sh'?v:(v||0)*100);
      });
      var bg=simKeys.map(function(k){return pal[k]||'#3b82f6';});
      new Chart(document.getElementById(mt.id),{
        type:'bar',
        data:{labels:simLabels,datasets:[{data:vals,backgroundColor:bg}]},
        options:{responsive:true,maintainAspectRatio:true,indexAxis:'y',
          scales:{x:{beginAtZero:true,ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}},
          plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return mt.fmt(d.sim[simKeys[ctx.dataIndex]][mt.key]);}}}}}
      });
    });
    charts.simCharts=metrics.length;
  }}catch(e){console.error('Sim chart err:',e);}

  // ---- 对比图表 ----
  try{
  if(charts.cmp){try{charts.cmp.destroy();}catch(e){}charts.cmp=null;}
  var lbs=d.res?d.res.map(function(r){return MN[r.model]||r.model;}):[];
  var cmpData=d.res?d.res.map(function(r){return r.F1||0;}):[];
  if(lbs.length>0){
    var cmpChart = new Chart($('cmpC'), {
      type: 'bar',
      data: {
        labels: lbs,
        datasets: [
          {label: 'Accuracy', data: d.res.map(function(r){return r.Accuracy||0;}), backgroundColor: '#3b82f6'},
          {label: 'Precision', data: d.res.map(function(r){return r.Precision||0;}), backgroundColor: '#10b981'},
          {label: 'Recall', data: d.res.map(function(r){return r.Recall||0;}), backgroundColor: '#f59e0b'},
          {label: 'F1', data: d.res.map(function(r){return r.F1||0;}), backgroundColor: '#8b5cf6'}
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          y: {min: 0, max: 1, title: {display: true, text: '得分'}}
        },
        plugins: {
          legend: {position: 'bottom', labels: {font: {size: 10}, boxWidth: 12}}
        }
      }
    });
    charts.cmp = cmpChart;
  }
  }catch(e){console.error('CMP render err:',e);}


  tab('roc');
  }catch(e){err('渲染错误: '+e.message);console.error(e);}
}
</script>
